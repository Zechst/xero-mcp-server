services:
  - type: web
    name: xero-mcp-server
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:http
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: XERO_CLIENT_ID
        sync: false
      - key: XERO_CLIENT_SECRET
        sync: false
      - key: XERO_REFRESH_TOKEN
        sync: false
